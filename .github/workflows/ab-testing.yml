name: A/B Testing Framework

on:
  workflow_dispatch:
    inputs:
      experiment_name:
        description: 'Name of the experiment'
        required: true
        type: string
      variant_percentage:
        description: 'Percentage for variant B (0-100)'
        required: true
        type: number
        default: 50

jobs:
  setup-experiment:
    runs-on: ubuntu-latest
    outputs:
      variant: ${{ steps.assign.outputs.variant }}
    steps:
      - uses: actions/checkout@v4

      - name: Assign variant
        id: assign
        run: |
          RANDOM_NUM=$((RANDOM % 100))
          if [ $RANDOM_NUM -lt ${{ inputs.variant_percentage }} ]; then
            echo "variant=B" >> $GITHUB_OUTPUT
          else
            echo "variant=A" >> $GITHUB_OUTPUT
          fi
          echo "Experiment: ${{ inputs.experiment_name }}"
          echo "Assigned variant: $(cat $GITHUB_OUTPUT | grep variant | cut -d= -f2)"

  run-variant:
    needs: setup-experiment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run variant ${{ needs.setup-experiment.outputs.variant }}
        run: |
          echo "Running variant ${{ needs.setup-experiment.outputs.variant }}"
          echo "Experiment: ${{ inputs.experiment_name }}"
