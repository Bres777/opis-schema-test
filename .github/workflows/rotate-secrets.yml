name: Rotate Secrets

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  rotate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check secret age
        run: |
          echo "Checking secret rotation schedule..."
          echo "Last rotated: $(date -d '30 days ago')"

      - name: Generate new token
        id: new-token
        run: |
          NEW_TOKEN=$(openssl rand -hex 32)
          echo "token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          echo "Generated new token (truncated): ${NEW_TOKEN:0:8}..."

      - name: Update secret via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Would update secret via GitHub API"
          echo "gh secret set DEPLOY_TOKEN --body \$NEW_TOKEN"

      - name: Verify rotation
        run: echo "Secret rotation workflow completed at $(date)"
